name: Build

on:
  schedule:
    - cron: '0 19 * * *' # 每天北京时间 03:00 运行一次测试构建
  # 1. 当代码推送到 main 分支时
  push:
    branches:
      - 'master'
      - 'main'
    # 且修改了应用或文档相关文件
    paths:
      - 'composeApp/**'         # Kotlin Multiplatform 核心代码
      - 'shared/**'
      - 'ui-theme/**'
      - 'data-model/**'
      - 'data-network/**'
      - 'iosApp/**'
      - 'build-logic/**'
      - 'cpp/**'                # LiteRT / Bazel 原生库源码
      - 'gradle/**'             # Gradle wrapper
      - '**/*.gradle.kts'
      - 'gradle.properties'
      - '.bazelrc.user'
      - 'docs/AppIcon.*'
      - '.github/workflows/**' # 工作流自身变更
  pull_request:
    branches:
      - 'master'
      - 'main'
    paths:
      - 'composeApp/**'
      - 'shared/**'
      - 'ui-theme/**'
      - 'data-model/**'
      - 'data-network/**'
      - 'iosApp/**'
      - 'build-logic/**'
      - 'cpp/**'
      - 'gradle/**'
      - '**/*.gradle.kts'
      - 'gradle.properties'
      - '.bazelrc.user'
      - 'docs/AppIcon.*'
      - '.github/workflows/**'
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run tests
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          lfs: true

      - name: Ensure Gradle Wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure Gradle CI properties
        run: echo "kotlin.native.ignoreDisabledTargets=true" >> gradle.properties

      - name: Run tests
        run: ./gradlew jvmTest

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-latest
            task: ./gradlew packageReleaseDmg

          - name: linux-x86_64
            runner: ubuntu-22.04
            task: ./gradlew createReleaseDistributable packageReleaseDeb packageReleaseRpm

          #          - name: linux-aarch64
          #            runner: ubuntu-24.04-arm
          #            task: ./gradlew createReleaseDistributable packageReleaseDeb packageReleaseRpm

          - name: windows-x86_64
            runner: windows-latest
            task: ./gradlew.bat createReleaseDistributable packageReleaseMsi packageReleaseExe

    #          - name: windows-arm64
    #            runner: windows-11-arm
    #            task: ./gradlew.bat createReleaseDistributable packageReleaseMsi packageReleaseExe

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.name }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # [新增] 针对 Windows 平台开启长路径支持
      - name: Enable Windows Long Paths
        if: startsWith(matrix.name, 'windows')
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
        shell: powershell

      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          lfs: true

      - name: Fetch Git LFS assets
        shell: bash
        run: |
          git lfs install --local
          git lfs pull
          git submodule foreach --recursive 'git lfs install --local && git lfs pull'

      - name: Ensure Gradle Wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ startsWith(matrix.name, 'windows') && 'jetbrains' || 'zulu' }}
          java-version: 21


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure Gradle CI properties
        run: echo "kotlin.native.ignoreDisabledTargets=true" >> gradle.properties

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Linux build dependencies
        if: startsWith(matrix.name, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake ninja-build pkg-config python3 python3-numpy rpm fakeroot

      - name: Setup MSBuild (Windows)
        if: startsWith(matrix.name, 'windows')
        uses: microsoft/setup-msbuild@v2

      - name: Install Bazelisk (Unix)
        if: "!startsWith(matrix.name, 'windows')"
        run: |
          npm install -g @bazel/bazelisk
          bazelisk --version

      - name: Install Bazelisk (Windows)
        if: startsWith(matrix.name, 'windows')
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "bazelisk"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          $bazelisk = Join-Path $installDir "bazelisk.exe"
          Invoke-WebRequest `
            -Uri "https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-windows-amd64.exe" `
            -OutFile $bazelisk
          $installDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $bazelisk --version

      - name: Restore Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-${{ runner.os }}-${{ matrix.name }}-${{ hashFiles('cpp/lite-rt-lm/.bazelversion', 'cpp/lite-rt-lm/.bazelrc', 'cpp/lite-rt-lm/WORKSPACE', 'cpp/lite-rt-lm/kotlin/java/**/BUILD*', 'cpp/lite-rt-lm/python/**/BUILD*', 'cpp/lite-rt-lm/runtime/**/BUILD*') }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ matrix.name }}-
            bazel-${{ runner.os }}-

      - name: Configure Bazel user rc (Unix)
        if: "!startsWith(matrix.name, 'windows')"
        env:
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          BAZEL_OUTPUT_ROOT="${RUNNER_TEMP}/bazel-output"
          BAZEL_DISK_CACHE="${HOME}/.cache/bazel-disk"
          mkdir -p "$BAZEL_OUTPUT_ROOT" "$BAZEL_DISK_CACHE"
          cat > .bazelrc.user <<EOF
          startup --output_user_root=$BAZEL_OUTPUT_ROOT
          build --disk_cache=$BAZEL_DISK_CACHE
          build --verbose_failures
          EOF
          if [[ "$MATRIX_NAME" == linux* ]]; then
            cat >> .bazelrc.user <<EOF
          build --define=xnn_enable_avxvnniint8=false
          EOF
          fi
          cat .bazelrc.user

      - name: Configure Bazel user rc (Windows)
        if: startsWith(matrix.name, 'windows')
        shell: pwsh
        run: |
          $bazelOutputRoot = Join-Path $env:RUNNER_TEMP "bazel-output"
          $bazelDiskCache = Join-Path $env:USERPROFILE ".cache\bazel-disk"
          New-Item -ItemType Directory -Force -Path $bazelOutputRoot, $bazelDiskCache | Out-Null

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found. Visual Studio Build Tools are required for the Windows Bazel target."
          }

          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio C++ toolchain not found."
          }

          $vcPath = Join-Path $vsInstall "VC"
          if (-not (Test-Path $vcPath)) {
            throw "Visual Studio VC path not found: $vcPath"
          }

          $bazelOutputRoot = $bazelOutputRoot -replace "\\", "/"
          $bazelDiskCache = $bazelDiskCache -replace "\\", "/"
          $vcPath = $vcPath -replace "\\", "/"

          @"
          startup --output_user_root=$bazelOutputRoot
          build --disk_cache=$bazelDiskCache
          build --verbose_failures
          build --action_env=BAZEL_VC="$vcPath"
          build --repo_env=BAZEL_VC="$vcPath"
          build:msvc_target_utf8 --copt=/utf-8
          build:msvc_target_utf8 --cxxopt=/utf-8
          build:msvc_target_utf8 --host_copt=/utf-8
          build:msvc_target_utf8 --host_cxxopt=/utf-8
          build:win_host --host_copt=/utf-8
          build:win_host --host_cxxopt=/utf-8
          "@ | Set-Content -Path .bazelrc.user -Encoding UTF8

          Get-Content .bazelrc.user

      - name: Build
        if: "!startsWith(matrix.name, 'windows')"
        run: ${{ matrix.task }}

      - name: Build (Windows)
        if: startsWith(matrix.name, 'windows')
        env:
          # windows-latest exposes ANDROID_NDK_HOME. The LiteRT Bazel workspace
          # treats that as a signal to register @androidndk, whose Windows
          # symlink setup cannot use the hosted runner's SDK directory.
          ANDROID_NDK_HOME: ''
          ANDROID_NDK_ROOT: ''
        run: |
          $workspace = (Get-Location).Path
          if (Test-Path "V:\") {
            subst V: /D
          }
          subst V: "$workspace"
          Set-Location "V:\"
          ${{ matrix.task }}
          $exitCode = $LASTEXITCODE
          Set-Location "$workspace"
          subst V: /D
          exit $exitCode

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.name }}
          path: composeApp/build/compose/binaries/main-release

  build-mobile:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ios
            task: ./gradlew buildReleaseIpa
            path: composeApp/build/archives/release/*.ipa
          - name: android
            task: ./gradlew assembleRelease
            path: composeApp/build/outputs/apk/release/*.apk

    runs-on: macos-latest
    name: Build ${{ matrix.name }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          lfs: true

      - name: Fetch Git LFS assets
        shell: bash
        run: |
          git lfs install --local
          git lfs pull
          git submodule foreach --recursive 'git lfs install --local && git lfs pull'

      - name: Ensure Gradle Wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure Gradle CI properties
        run: echo "kotlin.native.ignoreDisabledTargets=true" >> gradle.properties

      - name: Install Android SDK components
        if: ${{ matrix.name == 'android' }}
        env:
          ANDROID_NDK_VERSION: 27.0.12077973
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-$HOME/Library/Android/sdk}}"
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            echo "::error::sdkmanager not found at $SDKMANAGER"
            find "$ANDROID_SDK_ROOT" -maxdepth 4 -name sdkmanager -type f || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-36" "ndk;$ANDROID_NDK_VERSION"
          "$SDKMANAGER" "build-tools;36.0.0" || "$SDKMANAGER" "build-tools;35.0.0"

          ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
            echo "::error::Android NDK was not installed at $ANDROID_NDK_HOME"
            exit 1
          fi

          {
            echo "ANDROID_HOME=$ANDROID_SDK_ROOT"
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
            echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
            echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME"
          } >> "$GITHUB_ENV"

          printf 'sdk.dir=%s\nndk.dir=%s\n' "$ANDROID_SDK_ROOT" "$ANDROID_NDK_HOME" > local.properties

      - name: Setup Node.js (Android)
        if: ${{ matrix.name == 'android' }}
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Bazelisk (Android)
        if: ${{ matrix.name == 'android' }}
        run: |
          npm install -g @bazel/bazelisk
          bazelisk --version

      - name: Restore Bazel disk cache (Android)
        if: ${{ matrix.name == 'android' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-${{ runner.os }}-${{ matrix.name }}-${{ hashFiles('cpp/lite-rt-lm/.bazelversion', 'cpp/lite-rt-lm/.bazelrc', 'cpp/lite-rt-lm/WORKSPACE', 'cpp/lite-rt-lm/kotlin/java/**/BUILD*', 'cpp/lite-rt-lm/python/**/BUILD*', 'cpp/lite-rt-lm/runtime/**/BUILD*') }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ matrix.name }}-
            bazel-${{ runner.os }}-

      - name: Configure Bazel user rc (Android)
        if: ${{ matrix.name == 'android' }}
        run: |
          BAZEL_OUTPUT_ROOT="${RUNNER_TEMP}/bazel-output"
          BAZEL_DISK_CACHE="${HOME}/.cache/bazel-disk"
          mkdir -p "$BAZEL_OUTPUT_ROOT" "$BAZEL_DISK_CACHE"
          cat > .bazelrc.user <<EOF
          startup --output_user_root=$BAZEL_OUTPUT_ROOT
          build --disk_cache=$BAZEL_DISK_CACHE
          build --verbose_failures
          EOF
          cat .bazelrc.user

      - name: Setup Signing
        id: sign
        if: ${{ matrix.name == 'android' }}
        env:
          RELEASE_KEY_BASE64: ${{ secrets.RELEASE_KEY }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key = os.environ.get("RELEASE_KEY_BASE64", "").strip()
          output = Path("composeApp/release.jks")
          output.write_bytes(base64.b64decode(key) if key else b"")
          PY
          test -s composeApp/release.jks && echo release_key_exists=true >> "$GITHUB_OUTPUT" || echo release_key_exists=false >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          RELEASE_KEY_EXISTS: ${{ steps.sign.outputs.release_key_exists }}
          RELEASE_KEY_STORE_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ${{ matrix.task }}

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.path }}

  package:
    needs: build-desktop
    runs-on: ubuntu-latest
    name: Package artifacts
    steps:
      # 下载所有需要的 artifacts
      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@v5
        with:
          name: macos-aarch64
          path: macos-aarch64

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v5
        with:
          name: linux-x86_64
          path: linux-x86_64



      - name: Download Windows x86_64 artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-x86_64
          path: windows-x86_64

      #      - name: Download Windows arm64 artifact
      #        uses: actions/download-artifact@v5
      #        with:
      #          name: windows-arm64
      #          path: windows-arm64

      # 重命名文件
      - name: Rename artifacts
        run: |
          # Get base filename from macOS DMG
          if [ ! -d "macos-aarch64/dmg" ]; then
            echo "::error::macos-aarch64 DMG artifact directory not found"
            exit 1
          fi
          DMG_FILE=$(find macos-aarch64/dmg -name "*.dmg" -type f | head -n 1)
          if [ -z "$DMG_FILE" ]; then
            echo "::error::macos-aarch64 DMG artifact not found"
            exit 1
          fi
          BASE_NAME=$(basename "$DMG_FILE" .dmg)
          echo "Base filename: $BASE_NAME"

          # macOS
          for arch in aarch64; do
            if [ -d "macos-${arch}/dmg" ]; then
              for file in macos-${arch}/dmg/*.dmg; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file" .dmg)
                  mv "$file" "macos-${arch}/dmg/${filename}-macos-${arch}.dmg"
                fi
              done
            fi
          done

          # Windows
          for arch in x86_64 arm64; do
            if [ -d "windows-${arch}/msi" ]; then
              for file in windows-${arch}/msi/*.msi; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file" .msi)
                  mv "$file" "windows-${arch}/msi/${filename}-windows-${arch}.msi"
                fi
              done
            fi
            if [ -d "windows-${arch}/exe" ]; then
              for file in windows-${arch}/exe/*.exe; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file" .exe)
                  mv "$file" "windows-${arch}/exe/${filename}-windows-${arch}.exe"
                fi
              done
            fi
            # Package portable as zip
            if [ -d "windows-${arch}/app/Agro" ]; then
              cd windows-${arch}/app
              zip -r "../../${BASE_NAME}-windows-${arch}.zip" Agro
              cd ../..
            fi
          done

      # 上传新的 artifacts
      - name: Upload macOS aarch64 DMG
        uses: actions/upload-artifact@v5
        with:
          name: macos-aarch64-dmg
          path: macos-aarch64/dmg/*.dmg

      - name: Upload Linux x86_64 DEB
        uses: actions/upload-artifact@v5
        with:
          name: linux-x86_64-deb
          path: linux-x86_64/deb/*.deb

      - name: Upload Linux x86_64 RPM
        uses: actions/upload-artifact@v5
        with:
          name: linux-x86_64-rpm
          path: linux-x86_64/rpm/*.rpm

      - name: Upload Windows x86_64 MSI
        uses: actions/upload-artifact@v5
        with:
          name: windows-x86_64-msi
          path: windows-x86_64/msi/*.msi

      - name: Upload Windows x86_64 EXE
        uses: actions/upload-artifact@v5
        with:
          name: windows-x86_64-exe
          path: windows-x86_64/exe/*.exe

      - name: Upload Windows x86_64 Portable
        uses: actions/upload-artifact@v5
        with:
          name: windows-x86_64-portable
          path: '*-windows-x86_64.zip'

  package-appimage:
    needs: build-desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            appimagetool: appimagetool-x86_64.AppImage

    runs-on: ${{ matrix.runner }}
    name: Build Linux ${{ matrix.arch }} AppImage
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          lfs: true

      - name: Download macOS aarch64 artifact
        uses: actions/download-artifact@v5
        with:
          name: macos-aarch64
          path: macos-aarch64

      - name: Download Linux ${{ matrix.arch }} artifact
        uses: actions/download-artifact@v5
        with:
          name: linux-${{ matrix.arch }}
          path: linux-${{ matrix.arch }}

      - name: Build AppImage
        run: |
          # Get base filename from macOS DMG
          if [ ! -d "macos-aarch64/dmg" ]; then
            echo "::error::macos-aarch64 DMG artifact directory not found"
            exit 1
          fi
          DMG_FILE=$(find macos-aarch64/dmg -name "*.dmg" -type f | head -n 1)
          if [ -z "$DMG_FILE" ]; then
            echo "::error::macos-aarch64 DMG artifact not found"
            exit 1
          fi
          BASE_NAME=$(basename "$DMG_FILE" .dmg)
          echo "Base filename: $BASE_NAME"
          
          # Download appimagetool
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/${{ matrix.appimagetool }}
          chmod +x ${{ matrix.appimagetool }}

          # Prepare AppDir
          mkdir -p AppDir/usr
          cp -r linux-${{ matrix.arch }}/app/Agro/* AppDir/usr

          # Create desktop file
          cat > AppDir/Agro.desktop << 'EOF'
          [Desktop Entry]
          Name=Agro
          Exec=Agro
          Icon=Agro
          Terminal=false
          Type=Application
          Categories=Utility;
          EOF

          # Create AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/Agro" "$@"
          EOF

          # Copy icon if exists
          if [ -f "docs/AppIcon.png" ]; then
            cp docs/AppIcon.png AppDir/Agro.png
          fi

          # Fix permissions
          chmod a+x AppDir/AppRun
          chmod a+x AppDir/usr/bin/Agro

          # Build AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=${{ matrix.arch }} ./${{ matrix.appimagetool }} AppDir
          
          # Rename AppImage with base name from DMG
          mv Agro-${{ matrix.arch }}.AppImage ${BASE_NAME}-linux-${{ matrix.arch }}.AppImage
          chmod a+x ${BASE_NAME}-linux-${{ matrix.arch }}.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-${{ matrix.arch }}-appimage
          path: '*-linux-${{ matrix.arch }}.AppImage'

  cleanup:
    needs: [ package-appimage, package ]
    runs-on: ubuntu-latest
    name: Cleanup original artifacts
    steps:
      - name: Delete original artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            macos-aarch64
            linux-x86_64
            linux-aarch64
            windows-x86_64
            windows-arm64
